app:
  name: "VintageWisdom"
  version: "1.0.0"
  debug: false

storage:
  database_path: "data/vintagewisdom.db"
  vector_index_path: "data/vectors"
  graph_path: "data/graph"
  backup_enabled: false
  backup_interval: "daily"

kg:
  store: "sqlite"
  neo4j:
    uri: "bolt://127.0.0.1:7687"
    user: "neo4j"
    password: ""
    database: "neo4j"
  redis:
    url: ""
    ttl_seconds: 300
  hot_index:
    refresh_seconds: 60

graphrag:
  enabled: false
  qdrant:
    url: "http://127.0.0.1:6333"
    collection: "vw_case_chunks"
    vector_size: 1024
  embedding:
    provider: "ollama"
    model: "nomic-embed-text"
    api_base: ""
    api_key: ""
  chunking:
    max_chars: 1400
    overlap_chars: 200
  retrieval:
    top_k: 20

ai:
  provider: "ollama"
  model: "deepseek-r1:7b"
  api_base: ""
  api_key: ""
  timeout_s: 30
  retries: 1

retrieval:
  top_k: 5

nlp:
  embedding_model: "paraphrase-multilingual-MiniLM-L12-v2"
  spacy_model_zh: "zh_core_web_sm"
  spacy_model_en: "en_core_web_sm"
  max_sequence_length: 512

aio:
  local_model: "phi-3-mini"
  use_cloud: false
  cloud_model: "gpt-4"
  redteam_enabled: true
  future_self_enabled: false

bias_detection:
  confirmation_bias_threshold: 0.7
  planning_fallacy_threshold: 1.5
  emotion_check_enabled: true

plugins:
  user_dir: "./plugins"
  disabled: []
  config:
    ai:
      redteam:
        mode: "llm" # llm | template
        llm:
          max_recommendations: 6
          max_layers: 6
      reasoning:
        mode: "rule" # llm | rule
    bias:
      detector:
        mode: "heuristic" # llm | heuristic
    evidence:
      builder:
        max_cases: 5
        max_snippets: 8
        snippet_chars: 240
        kg:
          enabled: true
          max_paths: 6
          depth: 1
          max_entities: 120
          max_relations: 200
